<!--
  include: head.html
  说明: 这是页面的 <head> 片段，包含字符集、SEO、样式引用和统计脚本。
  可修改项:
    - 修改主题样式路径: <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
    - 覆盖样式: /css/override.css
    - 管理 Google Analytics: 修改 `_config.yml` 中的 `google_analytics`，该代码块会在 production 环境生效
  注意事项: 这里使用 Liquid 标签（如 `site.google_analytics`、`jekyll.environment`），请勿破坏语法。
-->
<!-- Site build date: {{ "now" | date: "%FT%T%z" }} -->
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Begin SEO -->
  {% seo %}
  <!-- End SEO -->

  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  <!-- 引入中文/英文字体（Google Fonts: Noto Sans SC + Roboto） -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" type="text/css" href="/css/override.css">

  {% feed_meta %}

  <!--
    Highlight.js 本地引入说明：
    1. 将你从 https://highlightjs.org/download 下载得到的整个文件夹复制到仓库的 `js/highlightjs/` 下。
       例如：目标路径应该包含 `js/highlightjs/highlight.min.js` 和 `js/highlightjs/styles/<theme>.min.css` 等。
    2. 本模板会引用本地文件（相对站点根），引用路径使用了 `relative_url` 以兼容 GitHub Pages。
    3. 如果你更愿意使用 CDN，请把下面的本地引用替换为 CDN 链接（之前的建议中有 CDN 示例）。
  -->

  <!-- 引入 highlight.js 的样式（把 github.min.css 改为你下载的主题文件名） -->
  <link rel="stylesheet" href="{{ '/js/highlightjs/styles/github.min.css' | relative_url }}">

  <!-- 引入 highlight.js 脚本（本地文件）并在页面加载后执行高亮 -->
  <script src="{{ '/js/highlightjs/highlight.min.js' | relative_url }}" defer></script>
  <script defer>
    document.addEventListener('DOMContentLoaded', function() {
      if (window.hljs) {
        try { hljs.highlightAll(); } catch(e) { console.warn('hljs highlightAll error', e); }
      }
    });
  </script>

  {% if jekyll.environment == 'production' and site.google_analytics -%}
  <!-- Begin Google Analytics (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics }}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);} 
    gtag('js', new Date());

    gtag('config', '{{ site.google_analytics }}');
  </script>
  <!-- End Google Analytics (gtag.js) -->
  {%- endif %}

  <!-- Baidu Analytics -->
  <script>
  var _hmt = _hmt || [];
  (function() {
    var hm = document.createElement("script");
    hm.src = "https://hm.baidu.com/hm.js?195f0fd4dcb5f6a1e29b4404487bd342";
    var s = document.getElementsByTagName("script")[0]; 
    s.parentNode.insertBefore(hm, s);
  })();
  </script>

</head>
