<!--
  include: navlinks.html
  说明: 文章页底部的上一篇/下一篇导航块。
  可修改项:
    - 文本标签（如 "上一篇"、"下一篇"）可以直接在模板中修改。
    - 当不存在上一篇或下一篇时，模板会回退到 archive 页面。
  注意事项: 使用了 `page.previous` 和 `page.next` 等 Jekyll 变量，保持 Liquid 语法完整。
-->
<hr>
<div class="post_navi">
  {%- if page.previous.url -%}
  <a class="post_navi-item nav_prev" href="{{ page.previous.url }}" title="{{ page.previous.title }}">
    <div class="post_navi-arrow">&lt;</div><div class="post_navi-label">上一篇</div><div><span>{{ page.previous.title }}</span></div>
  </a>
  {%- else -%}
  <a class="post_navi-item nav_prev" href="{{ 'archive.html' | absolute_url }}" title="Blog Archive">
    <div class="post_navi-arrow">&lt;</div><div class="post_navi-label">我的笔记</div><div><span>看完了,回到我的笔记</span></div>
  </a>
  {%- endif -%}
  {%- if page.next.url -%}
  <a class="post_navi-item nav_next" href="{{ page.next.url }}" title="{{ page.next.title }}">
    <div class="post_navi-arrow">&gt;</div><div class="post_navi-label">下一篇</div><div><span>{{ page.next.title }}</span></div>
  </a>
  {%- else -%}
  <a class="post_navi-item nav_next" href="{{ 'archive.html' | absolute_url }}" title="Blog Archive">
    <div class="post_navi-arrow">&gt;</div><div class="post_navi-label">我的笔记</div><div><span>看完了,回到我的笔记</span></div>
  </a>
  {%- endif -%}
</div>
